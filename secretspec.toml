[project]
name = "cinematch"
revision = "1.0"
# Extend configurations from subdirectories
# extends = [ "subdir1", "subdir2" ]

[profiles.default]
SUPABASE_ANON_KEY = { description = "SUPABASE_ANON_KEY secret", required = true }
SUPABASE_URL = { description = "SUPABASE_URL secret", required = true }
TMDB_API_KEY = { description = "TMDB_API_KEY secret", required = true }
SUPABASE_PROJECT_REF = { description = "SUPABASE_PROJECT_REF secret", required = true }

[profiles.development]
# Development profile inherits all secrets from default profile
# Only define secrets here that need different values or settings than default
# DATABASE_URL = { default = "sqlite:///dev.db" }
#
# New secrets
# REDIS_URL = { description = "Redis connection URL for caching", required = false, default = "redis://localhost:6379" }
