[secrets]
SUPABASE_PROJECT_REF = { description = "Supabase project reference (e.g., ixpuxpwssvkjqvfylfbt) - found in project settings" }
SUPABASE_URL = { description = "Supabase project URL (e.g., https://ixpuxpwssvkjqvfylfbt.supabase.co)" }
SUPABASE_ANON_KEY = { description = "Supabase anon/key for client access (starts with sb_publishable_)" }
SUPABASE_SERVICE_KEY = { description = "Supabase service role key for server-side operations (optional, for edge functions)" }
TMDB_API_KEY = { description = "TMDB v4 Bearer token for movie data, search, watch providers" }
TMDB_ACCESS_TOKEN = { description = "TMDB access token for read/write operations (optional)" }